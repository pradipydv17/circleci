version: 2.1  # circleci version

jobs:
  build:
    working_directory: ~/circleci-demo
    docker:
      - image: cimg/python:3.11.5
    steps:
      - checkout
      - run: python3 main.py

  test:
    working_directory: ~/circleci-demo
    docker:
      - image: cimg/python:3.11.5
    steps:
      - checkout
      - run: python3 main_test.py

workflows:
  build_and_test:
    jobs:
      - build
      - test:
          requires:
            - build